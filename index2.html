<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sretan 8. mart 💐</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffb6d5,#fff);
      font-family:Arial;
      text-align:center;
    }
    .box{
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 40px rgba(0,0,0,0.2);
    }
    button{
      padding:15px 25px;
      border:none;
      border-radius:30px;
      font-size:18px;
      cursor:pointer;
      background:#ff4d88;
      color:white;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sretan 8. Mart 💐</h1>
    <p>Za osmijeh koji uljepšava svaki dan i ljubav koju nesebično daješ ❤️</p>
    <button onclick="document.getElementById('music').play()">
      ▶️ Pusti pjesmu
    </button>
    <audio id="music">
      <source src="pjesma2.mp3" type="audio/mpeg">
    </audio>
  </div>
</body>
</html>
